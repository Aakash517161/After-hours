    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');
        
        /* ========= DUAL PHYSICS & THEME VARIABLES ========= */
        :root {
            /* NIGHT MODE (Deep, Slow, Smooth) */
            --bg-rgb: 8, 5, 4; 
            --bg-deep: #0a0604;
            --bg-card: rgba(20, 12, 8, 0.5);
            --bg-glass: rgba(10, 6, 4, 0.6);
            --text-main: #f4eade;
            --text-muted: #8c7e73;
            --border-color: rgba(255,255,255,0.05);
            --gold: #c69b6a;
            --accent-pour: #1f110a; 
            
            /* Physics Engine */
            --anim-speed: 0.8s;
            --anim-ease: cubic-bezier(0.4, 0, 0.2, 1); 
            --card-lift: -8px;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.8);
            
            /* Cart visibility fixed to ALWAYS BE LIGHT */
            --cart-bg: #ffffff; 
            --cart-text: #1a120e; 
            --cart-border: rgba(0,0,0,0.1);
        }

        body.light-mode {
            /* DAY MODE (Bright, Snappy, Bouncy) */
            --bg-rgb: 242, 233, 223;
            --bg-deep: #f2e9df;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.6);
            --text-main: #2b1c11;
            --text-muted: #736154;
            --border-color: rgba(0,0,0,0.08);
            --gold: #b0703c;
            --accent-pour: #fdfaf6; 
            
            /* Physics Engine */
            --anim-speed: 0.4s;
            --anim-ease: cubic-bezier(0.34, 1.56, 0.64, 1); 
            --card-lift: -15px;
            --card-shadow: 0 25px 40px rgba(176, 112, 60, 0.15);
            
            /* Cart visibility */
            --cart-bg: #ffffff; 
            --cart-text: #1a120e; 
            --cart-border: rgba(0,0,0,0.1);
        }

        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto; }
        /* Removed "cursor: none" from body to prevent invisible mouse bug */
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Outfit', sans-serif; overflow-x: hidden; transition: background-color 0.1s, color 0.1s; }
        ::selection { background: var(--gold); color: #fff; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* Custom class added by JS only when a mouse is detected */
        .hide-native-cursor, .hide-native-cursor * { cursor: none !important; }

        /* ========= OLD-SCHOOL FROSTED GLASS ========= */
        .old-frost {
            background: var(--bg-card);
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            border: 1px solid var(--border-color);
            transition: all var(--anim-speed) var(--anim-ease);
        }

        /* ========= THE VIBE SELECTOR (PRELOADER) ========= */
        #vibe-selector { position: fixed; inset: 0; background: #0a0604; z-index: 100000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s; }
        .vibe-box { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 40px; text-align: center; }
        .vibe-btn-container { display: flex; gap: 20px; margin-top: 30px; justify-content: center; flex-wrap: wrap; }
        .vibe-btn { padding: 15px 30px; border-radius: 30px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; transition: 0.4s; cursor: none; }
        .btn-day { background: #f2e9df; color: #2b1c11; }
        .btn-day:hover { background: #fff; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(242,233,223,0.3); }
        .btn-night { background: #1f110a; color: #c69b6a; border: 1px solid #c69b6a; }
        .btn-night:hover { background: #c69b6a; color: #1f110a; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(198,155,106,0.3); }

        /* ========= LIQUID POUR TRANSITION ========= */
        .pour-container { position: fixed; inset: 0; z-index: 99999999; pointer-events: none; display: flex; filter: url('#goo'); }
        .pour-drip { flex: 1; height: 0vh; background: var(--accent-pour); border-radius: 0 0 100px 100px; transform-origin: top; margin: 0 -5px; }

        /* ========= SENSORY CURSOR ========= */
        .cursor-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999999; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s; opacity: 0; }
        .cursor-ring { width: 34px; height: 34px; border: 1px solid var(--gold); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999998; transform: translate(-50%, -50%); transition: width var(--anim-speed) var(--anim-ease), height var(--anim-speed) var(--anim-ease), backdrop-filter 0.2s; opacity: 0; }
        .cursor-click-ripple { position: fixed; width: 20px; height: 20px; border: 2px solid var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999997; transform: translate(-50%, -50%) scale(0); opacity: 0; }
        
        .hover-active .cursor-dot { width: 0; height: 0; }
        .hover-active .cursor-ring { width: 60px; height: 60px; background: rgba(212, 163, 115, 0.1); backdrop-filter: blur(4px); border-width: 2px; }
        
        .hover-no-blur .cursor-ring { backdrop-filter: none !important; background: transparent !important; border-color: var(--gold) !important; width: 30px !important; height: 30px !important; }

        /* ========= BIGGER ANALOG CLOCK ========= */
        .analog-clock { width: 60px; height: 60px; border: 2px solid var(--gold); border-radius: 50%; position: relative; background: transparent; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: var(--text-main); border-radius: 10px; }
        .hour-hand { width: 4px; height: 16px; margin-left: -2px; }
        .min-hand { width: 3px; height: 22px; margin-left: -1.5px; }
        .sec-hand { width: 1.5px; height: 26px; background: var(--gold); margin-left: -0.75px; }
        .clock-center { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* ========= MENU CARDS (3D Magnetic & Aroma Gimmick) ========= */
        .menu-card { position: relative; overflow: visible; border-radius: 24px; z-index: 2; transform-style: preserve-3d; background: var(--bg-card); border: 1px solid var(--border-color); }
        
        .menu-img-wrap { height: 260px; overflow: hidden; position: relative; border-radius: 24px 24px 0 0; }
        .menu-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        
        /* Aroma Steam Gimmick */
        .aroma-steam { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 60px; height: 80px; opacity: 0; pointer-events: none; z-index: 20; stroke: var(--gold); stroke-width: 3; }
        @keyframes riseUp { 0% { transform: translate(-50%, 0) scale(0.8); opacity: 0; filter: blur(1px); } 50% { opacity: 0.8; } 100% { transform: translate(-50%, -60px) scale(1.3); opacity: 0; filter: blur(4px); } }
        
        .offer-tag { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; font-weight: 800; padding: 6px 14px; border-radius: 30px; letter-spacing: 1px; z-index: 10; backdrop-filter: blur(10px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .tag-red { background: rgba(230, 57, 70, 0.9); color: #fff; }
        .tag-gold { background: rgba(212, 163, 115, 0.9); color: #000; }
        .tag-dark { background: rgba(30, 30, 30, 0.9); color: #fff; border: 1px solid var(--gold); }
        .tag-green { background: rgba(85, 107, 47, 0.9); color: #fff; }

        .add-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateZ(30px); background: var(--text-main); color: var(--bg-deep); padding: 14px 28px; border-radius: 40px; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow); transition: 0.3s; opacity: 0; width: 85%; justify-content: center; z-index: 30; pointer-events: none; }
        .add-btn.active { opacity: 1; pointer-events: auto; }
        .add-btn:hover { background: var(--gold); color: #fff; }
        @media (max-width: 768px) { .add-btn { opacity: 1; bottom: 15px; background: var(--text-main); color: var(--bg-deep); transform: translateX(-50%); pointer-events: auto; } }

        /* ========= 3D LIQUID DROPS (CART ANIMATION) ========= */
        .gooey-filter { filter: url('#goo'); position: fixed; inset: 0; z-index: 999999; pointer-events: none; }
        .liquid-drop-3d { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffeedb, var(--gold) 60%, #8b5e34); box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset -2px -2px 6px rgba(0,0,0,0.4); transform-origin: center; z-index: 999999; }

        /* ========= BRIGHT CART SIDEBAR ========= */
        #cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh; z-index: 10000; transition: 0.6s var(--anim-ease); background: var(--cart-bg); color: var(--cart-text); border-left: 1px solid var(--cart-border); display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,0.5); backdrop-filter: blur(30px); }
        #cart-sidebar.open { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 9999; opacity: 0; pointer-events: none; transition: 0.4s; }
        .cart-overlay.open { opacity: 1; pointer-events: all; }

        /* ========= THE ROASTING JOURNEY ACCORDION ========= */
        .process-item { border-bottom: 1px solid var(--border-color); padding: 25px 0; cursor: pointer; transition: var(--anim-speed) var(--anim-ease); overflow: hidden; height: 85px; }
        .process-item.active { height: 220px; border-bottom-color: var(--gold); }
        .process-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--text-muted); transition: 0.4s; display: flex; align-items: center; justify-content: space-between; }
        .process-item.active .process-title { color: var(--gold); font-size: 2.5rem; }
        .process-content { opacity: 0; transform: translateY(20px); transition: 0.4s; padding-top: 15px; color: var(--text-main); font-weight: 300; line-height: 1.6; }
        .process-item.active .process-content { opacity: 1; transform: translateY(0); }

        /* ========= HIMALAYAN ORIGINS PARALLAX ========= */
        .origin-section { position: relative; height: 60vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 50px; }
        .origin-bg { position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2000&auto=format&fit=crop') center/cover; opacity: 0.4; z-index: 0; filter: grayscale(50%); }
        body.light-mode .origin-bg { opacity: 0.2; filter: grayscale(0%); }

        /* ========= FOOTER & MAIN WRAPPER (Dynamic Fix) ========= */
        #main-content { position: relative; z-index: 2; background: var(--bg-deep); box-shadow: 0 40px 100px rgba(0,0,0,1); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; transition: background 0.8s ease; }
        footer { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1; background: #050302; display: flex; flex-direction: column; justify-content: center; transition: background
